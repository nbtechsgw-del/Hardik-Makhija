<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <h1>Registration Form-:</h1>
    <section>
        <form onsubmit="return ValidationForm()">
            <label for="FirstName">First Name-:</label>
            <input type="text" id="FirstName" placeholder="Enter Your First Name"><br>

            <label for="LastName">Last Name-:</label>
            <input type="text" id="LastName" placeholder="Enter Your Last Name"><br>

            <label for="email">email-:</label>
            <input type="email" id="email" placeholder="Enter Your email"><br>

            <label for="phone">Mobile Number-:</label>
            <input type="number" id="phone" placeholder="+91"><br>

            <label for="city">City-:</label>
            <input type="text" id="city" placeholder="Enter Your City"><br>

            <label for="PinCode">Pin Code-:</label>
            <input type="number" id="PinCode" placeholder="Enter Your Pin Code"><br>

            <label for="country">Country-:</label>
            <input type="text" id="country" placeholder="Enter Your Country"><br>

            <label for="password">Password-:</label>
            <input type="password" id="password" placeholder="Enter Your Password "><br>

            <label for="gender">Gender-:</label> <br> Male:
            <input type="radio" name="gender"> Female:
            <input type="radio" name="gender"> Trans:
            <input type="radio" name="gender"><br><br>

            <input type="submit" value="Register">
        </form>
    </section>

    <script src="form.js"></script>
</body>

</html>
